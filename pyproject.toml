[tool.ruff]
target-version = "py311"
line-length = 100
exclude = ["render.py", "layout.py"]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "ANN", # flake8-annotations (type hints)
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]
ignore = [
    "ANN101",  # missing type on self
    "ANN102",  # missing type on cls
    "ANN401",  # allow Any in rare cases
]

[tool.ruff.isort]
known-first-party = ["agents", "dtos", "graph", "mcp_server", "pipeline", "ui", "utils"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
exclude = ["tests/", "renders/", ".venv/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
markers = [
    "integration: marks tests that make real API calls (deselect with -m 'not integration')",
    "slow: marks tests that take > 5s",
]

[tool.coverage.run]
source = ["agents", "pipeline", "graph", "mcp_server", "utils", "dtos"]
omit = ["tests/*", "renders/*", ".venv/*", "ui/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
